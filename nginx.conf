events {
    worker_connections 1024;
}

http {
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=3r/s;
    limit_req_zone $binary_remote_addr zone=tasks_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=system_limit:10m rate=20r/s;

    limit_req_status 429;

    upstream backend {
        server app:8000;
    }

    server {
        listen 80;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $http_x_request_id;
        proxy_buffering on;
        proxy_request_buffering on;

        location /users/login {
            limit_req zone=login_limit burst=3 nodelay;
            proxy_pass http://backend;
        }

        location /tasks {
            limit_req zone=tasks_limit burst=10 nodelay;
            proxy_pass http://backend;
        }

        location /system {
            limit_req zone=system_limit burst=15 nodelay;
            proxy_pass http://backend;
        }

        location / {
            limit_req zone=api_limit burst=5 nodelay;
            proxy_pass http://backend;
        }
    }
}